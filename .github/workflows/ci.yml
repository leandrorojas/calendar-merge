name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Ruff only (no private deps needed)
        run: uv tool install "ruff>=0.9"

      - name: Ruff lint
        run: uv tool run ruff check src/ tests/

      - name: Ruff format check
        run: uv tool run ruff format --check src/ tests/

  test-and-typecheck:
    name: Test & type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up SSH for pyfangs (private dependency)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PYFANGS_DEPLOY_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Mypy type check
        run: uv run mypy src/ tests/

      - name: Pytest
        run: uv run pytest tests/ -v
